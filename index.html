<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBA Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="court-lines">
    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="circle-bg"></div>
  </div>

  <div class="container">
    <header>
      <div class="logo">🏀</div>
      <h1 class="title">NBA <span>Stats</span></h1>
      <p class="subtitle">Search any player in the league</p>
    </header>

    <div class="search-bar">
      <input type="text" id="playerInput" placeholder="e.g. LeBron James, Curry..." />
      <button id="searchBtn">Search</button>
    </div>

    <div id="error-msg" class="error-msg hidden">⚠ Player not found. Try another name.</div>
    <div id="loading" class="loading hidden">Loading...</div>

    <div id="results" class="results"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
